    setStatus('Rendering...');

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

ng:2px 10px}\n  .decisions ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:9px 28px}\n  .decisions li{position:relative;padding-left:20px;font-size:12px;line-height:1.42;color:var(--muted)}\n  .decisions li::before{content:\"\";position:absolute;left:0;top:6px;width:9px;height:9px;border-radius:3px;background:var(--decision)}\n  .decisions li b{color:var(--ink);font-weight:800}\n\n  @media print{\n    body{background:#fff;padding:0}\n    .scaler{height:auto !important}\n    .sheet{transform:none !important}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"scaler\">\n<div class=\"sheet\">\n\n  <div class=\"head\">\n    <div class=\"eyebrow\">\n      <svg class=\"mark\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"5\" cy=\"6\" r=\"3\" fill=\"#16b3a4\"><\u002Fcircle><circle cx=\"5\" cy=\"18\" r=\"3\" fill=\"#3d8ad6\"><\u002Fcircle><circle cx=\"19\" cy=\"12\" r=\"3\" fill=\"#ef6a39\"><\u002Fcircle><path d=\"M7.5 7.3 16.5 11M7.5 16.7 16.5 13\" stroke=\"#aab4da\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg>\n      UpKeep x Single Grain\n    <\u002Fdiv>\n    <h1>Food &amp; Beverage LinkedIn Funnel<\u002Fh1>\n    <div class=\"sub\">Full funnel proposal for the June 2 call. The spine: TOFU builds the pool, the pool becomes a retargeting audience, MOFU warms it, and from June 16 BOFU fires air-cover against the pool to convert it. The fixed checkpoint is the June 16 launch; the Day 14 read (~June 17) informs scaling. All audience sizes and campaign data pulled live from LinkedIn account 507686629 on June 1, 2026.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"timeline\">\n    <div class=\"tm\"><div class=\"pt\" style=\"background:var(--tofu)\"><\u002Fdiv><div class=\"d\">Jun 3<\u002Fdiv><div class=\"l\">Launch<\u002Fdiv><\u002Fdiv>\n    <div class=\"tm\"><div class=\"pt\" style=\"background:var(--mofu)\"><\u002Fdiv><div class=\"d\">~Jun 10<\u002Fdiv><div class=\"l\">MOFU + webinar opens<\u002Fdiv><\u002Fdiv>\n    <div class=\"tm\"><div class=\"pt\" style=\"background:var(--launch)\"><\u002Fdiv><div class=\"d\">Jun 16<\u002Fdiv><div class=\"l\">Email launch + air-cover<\u002Fdiv><\u002Fdiv>\n    <div class=\"tm\"><div class=\"pt\" style=\"background:var(--decision)\"><\u002Fdiv><div class=\"d\">Jun 17<\u002Fdiv><div class=\"l\">Day 14 hook read<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram\">\n\n    <!-- ============ CONNECTORS ============ -->\n    <svg class=\"wires\" viewBox=\"0 0 1100 2090\" preserveAspectRatio=\"xMidYMid meet\">\n      <defs>\n        <marker id=\"arw\" markerWidth=\"9\" markerHeight=\"9\" refX=\"6.5\" refY=\"3\" orient=\"auto\">\n          <path d=\"M0 0 L7 3 L0 6 Z\" fill=\"var(--wire)\"><\u002Fpath>\n        <\u002Fmarker>\n        <filter id=\"ds\" x=\"-20%\" y=\"-20%\" width=\"140%\" height=\"140%\">\n          <feDropShadow dx=\"0\" dy=\"5\" stdDeviation=\"6\" flood-color=\"#283464\" flood-opacity=\"0.20\"><\u002FfeDropShadow>\n        <\u002Ffilter>\n      <\u002Fdefs>\n      <g fill=\"none\" stroke=\"var(--wire)\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\">\n        <!-- start -> tofu stage -->\n        <path d=\"M550 80 L550 148\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- tofu stage -> ad set A / B -->\n        <path d=\"M550 222 L550 256 L267 256 L267 288\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <path d=\"M550 222 L550 256 L833 256 L833 288\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- tofu stage -> to-confirm callout -->\n        <path d=\"M860 186 L882 186\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- ad sets -> pool -->\n        <path d=\"M267 560 L267 678\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <path d=\"M833 560 L833 678\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- pool -> mofu -->\n        <path d=\"M550 874 L550 933\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- pool -> bofu (right branch) -->\n        <path d=\"M960 777 L1060 777 L1060 1630 L982 1630\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- mofu -> decision -->\n        <path d=\"M550 1257 L550 1268\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- decision diamond -->\n        <polygon points=\"550,1270 730,1370 550,1470 370,1370\" fill=\"var(--decision)\" stroke=\"var(--decision-d)\" stroke-width=\"2\" filter=\"url(#ds)\"><\u002Fpolygon>\n        <!-- decision branches -> bofu -->\n        <path d=\"M522 1456 L522 1510 L380 1510 L380 1558\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <path d=\"M578 1456 L578 1510 L720 1510 L720 1558\" marker-end=\"url(#arw)\"><\u002Fpath>\n        <!-- bofu -> launch -->\n        <path d=\"M550 1920 L550 1946\" marker-end=\"url(#arw)\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <!-- ============ NODES ============ -->\n\n    <!-- START -->\n    <div class=\"node term white\" style=\"left:270px;top:0;width:560px;height:80px;background:var(--start)\">\n      <div class=\"kicker\">START · Launch target Jun 3<\u002Fdiv>\n      <div class=\"n-title\">$28K June LinkedIn envelope<\u002Fdiv>\n      <div class=\"n-meta\">$8K base + $10K incremental + $10K Microsoft shift<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOFU stage bar -->\n    <div class=\"node white\" style=\"left:240px;top:150px;width:620px;height:72px;background:var(--tofu);display:flex;align-items:center;justify-content:center\">\n      <div>\n        <div class=\"kicker\">Stage 1 · TOFU · ~$13K<\u002Fdiv>\n        <div class=\"n-title\" style=\"margin-top:2px\">Awareness &amp; Engagement<\u002Fdiv>\n        <div class=\"n-meta\">Jun 3 - Jun 16 · Objective: Engagement<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOFU: to-confirm callout -->\n    <div class=\"callout foot\" style=\"left:884px;top:100px;width:216px;height:184px\">\n      <div class=\"ct\">To confirm on the call<\u002Fdiv>\n      <div class=\"cb\">The creative draft proposes Set A = matched 20k list and Set B = 1-3% lookalike on closed-won F&amp;B. This chart uses HubSpot F&amp;B Prospects + Manufacturing (live and building today). Align which audience set goes live before June 3.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOFU Ad Set A -->\n    <div class=\"node white\" style=\"left:0;top:290px;width:535px;height:270px;background:var(--tofu)\">\n      <div class=\"n-title\">Ad Set A · Hook 1 - Peer Productivity<\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Message<\u002Fspan><span class=\"v\">\"Your peers named their number. What's yours?\"<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Audience<\u002Fspan><span class=\"chips\"><span class=\"chip\">HubSpot F&amp;B Prospects<span class=\"sz\">1,784<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Ads<\u002Fspan><span class=\"chips\"><span class=\"chip\">1C Unnamed peer set<\u002Fspan><span class=\"chip\">1D Logo wall<\u002Fspan><span class=\"chip muted\">1A / 1B named (after legal)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Lands on<\u002Fspan><span class=\"v\">D7 Operations Teams · D3 F&amp;B customers wall (ungated)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOFU Ad Set B -->\n    <div class=\"node white\" style=\"left:565px;top:290px;width:535px;height:270px;background:var(--tofu)\">\n      <div class=\"n-title\">Ad Set B · Hook 4 - Multi-Site Standardization<\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Message<\u002Fspan><span class=\"v\">\"Three plants, three spreadsheets, three definitions of compliant\"<\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Audience<\u002Fspan><span class=\"chips\"><span class=\"chip\">002 Manufacturing<span class=\"sz\">40,479<\u002Fspan><\u002Fspan><span class=\"chip\">003<span class=\"sz\">10,773<\u002Fspan><\u002Fspan><span class=\"chip\">001<span class=\"sz\">4,765<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Ads<\u002Fspan><span class=\"chips\"><span class=\"chip\">4A Three plants<\u002Fspan><span class=\"chip\">4C The hidden tax<\u002Fspan><span class=\"chip muted\">4B Auditor frame<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Lands on<\u002Fspan><span class=\"v\">D6 Enterprise Asset Mgmt · D5 Sunset Grown story (ungated)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOFU footnote callout -->\n    <div class=\"callout foot\" style=\"left:270px;top:574px;width:560px;height:80px\">\n      <div class=\"cb\">Two hooks against two audience clusters = <b>four clean cells<\u002Fb>. Format choice is evidence-led: the account's TLA single image line is the proven winner at a <b>$32 CPA<\u002Fb>. Keep TOFU ungated, no demo asks. HubSpot F&amp;B Prospects is already building in LinkedIn, so it is not blocked on the ZoomInfo list.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ENGAGEMENT POOL -->\n    <div class=\"node dark\" style=\"left:140px;top:680px;width:820px;height:194px;background:var(--pool);display:flex;align-items:center;justify-content:center\">\n      <div style=\"max-width:760px\">\n        <div class=\"n-title\">Engagement pool - retargeting segment<\u002Fdiv>\n        <div class=\"n-meta\" style=\"margin-top:1px\">Continuous from launch · no extra spend<\u002Fdiv>\n        <div class=\"v\" style=\"font-size:11.5px;margin-top:7px\">Every video viewer, post engager and TOFU site visitor flows into a retargeting segment. This is the asset the whole funnel depends on: it grows through the first ~2 weeks, then becomes the audience MOFU warms and BOFU converts. <b>The two near-empty retargeting lines from May refill here.<\u002Fb><\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.78);border:1px solid #fff;border-radius:9px;padding:8px 12px;margin-top:11px;font-size:10.5px;line-height:1.4;color:var(--ink)\"><b>Prerequisite -<\u002Fb> the LinkedIn Insight Tag must be live and firing on every destination page (D1-D8) before launch. The pool only fills while the tag fires. No tag, no retargeting audience for BOFU.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MOFU -->\n    <div class=\"node white\" style=\"left:190px;top:935px;width:720px;height:322px;background:var(--mofu)\">\n      <div class=\"nhead\">\n        <div class=\"kicker\">Stage 2 · MOFU · ~$6K<\u002Fdiv>\n        <div class=\"n-title\">Gated content<\u002Fdiv>\n        <div class=\"n-meta\">~Jun 10 onward · Objective: Engagement / Lead Gen<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"subcards\">\n        <div class=\"subcard\">\n          <h5><span class=\"tag\" style=\"color:var(--mofu-d)\">AD SET<\u002Fspan> Warm engagers<\u002Fh5>\n          <div class=\"chips\"><span class=\"chip\">TOFU engagers (from pool)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"subcard\">\n          <h5><span class=\"tag\" style=\"color:var(--mofu-d)\">AD SET<\u002Fspan> F&amp;B lookalike<\u002Fh5>\n          <div class=\"chips\"><span class=\"chip\">New lookalike · seed F&amp;B Customers<span class=\"sz\">1,948<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"note\">Best held until the Day 14 read, not launched day one.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:10px\"><span class=\"k\">Ads<\u002Fspan><span class=\"chips\"><span class=\"chip\">1E Document ad (FY26 Benchmark)<\u002Fspan><span class=\"chip\">4D Document ad (Variance Audit)<\u002Fspan><span class=\"chip\">Rocky gated asset (ready)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Lands on<\u002Fspan><span class=\"chips\"><span class=\"chip\">D1 Forrester TEI<\u002Fspan><span class=\"chip\">D2 IDC buyer's guide<\u002Fspan><span class=\"chip\">D8 Asset Operations book<\u002Fspan><span class=\"chip\">Webinar registration<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"note\">The gated asset is ready, so MOFU stands up around June 10 with no dependency to wait on. Older dated assets sit here behind a gate, not as the TOFU first impression.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DECISION diamond text -->\n    <div class=\"diamond-txt\" style=\"left:435px;top:1322px;width:230px;height:96px\">\n      <div class=\"dk\">Decision<\u002Fdiv>\n      <div class=\"dt\">Day 14 read<\u002Fdiv>\n      <div class=\"ds\">Which hook won?<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Decision annotation -->\n    <div class=\"callout\" style=\"left:755px;top:1286px;width:300px;height:232px\">\n      <div class=\"ct\">Reallocation gate<\u002Fdiv>\n      <div class=\"cb\">Which hook earned the cheaper, deeper engagement? The leading hook takes ~70% of the next phase, and its video leg (1F or 4E) unlocks here as a 5th creative. The ~$13K still sitting under the Microsoft cap is available to scale the winner.<\u002Fdiv>\n      <div class=\"cb\" style=\"margin-top:8px;border-top:1px solid var(--line);padding-top:8px\"><b>Read on 4 signals:<\u002Fb> through-CTR (target &gt;0.6%), cost per landing-page view, gated-asset download completion, and pool size. The hook leading on cheaper, deeper engagement across these signals takes ~70% of the next phase.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- yes/no badges on the two decision branches -->\n    <div class=\"badge\" style=\"left:505px;top:1466px\">\n      <svg viewBox=\"0 0 34 34\"><circle cx=\"17\" cy=\"17\" r=\"13\" fill=\"#fff\" stroke=\"var(--check)\" stroke-width=\"3\"><\u002Fcircle><path d=\"M11 17.5 L15.2 21.5 L23 13\" fill=\"none\" stroke=\"var(--check)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"badge\" style=\"left:561px;top:1466px\">\n      <svg viewBox=\"0 0 34 34\"><circle cx=\"17\" cy=\"17\" r=\"13\" fill=\"#fff\" stroke=\"var(--x)\" stroke-width=\"3\"><\u002Fcircle><path d=\"M12 12 L22 22 M22 12 L12 22\" stroke=\"var(--x)\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <!-- branch labels -->\n    <div class=\"elabel\" style=\"left:312px;top:1522px;width:156px\">Winning hook · 70%<\u002Fdiv>\n    <div class=\"elabel\" style=\"left:652px;top:1522px;width:136px\">Hedge · 30%<\u002Fdiv>\n    <!-- pool->bofu label -->\n    <div class=\"elabel sm\" style=\"left:966px;top:1070px;width:90px\">Pool also feeds BOFU<\u002Fdiv>\n\n    <!-- BOFU -->\n    <div class=\"node white\" style=\"left:120px;top:1560px;width:860px;height:360px;background:var(--bofu)\">\n      <div class=\"nhead\">\n        <div class=\"kicker\">Stage 3 · BOFU · ~$9K<\u002Fdiv>\n        <div class=\"n-title\">Launch amplification<\u002Fdiv>\n        <div class=\"n-meta\">Jun 16+ · Objective: Website Conversion<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"subcards\">\n        <div class=\"subcard\">\n          <h5><span class=\"tag\" style=\"color:var(--bofu-d)\">AD SET<\u002Fspan> Retargeting pool<\u002Fh5>\n          <div class=\"chips\"><span class=\"chip\">Pool built in stages 1-2<\u002Fspan><span class=\"chip\">Demo Retargeting 90d<span class=\"sz\">3,833<\u002Fspan><\u002Fspan><span class=\"chip\">Non-Converters<span class=\"sz\">1,174<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"subcard\">\n          <h5><span class=\"tag\" style=\"color:var(--bofu-d)\">AD SET<\u002Fspan> MOFU engagers, no action<\u002Fh5>\n          <div class=\"chips\"><span class=\"chip\">MOFU ad / document engagers (native)<\u002Fspan><\u002Fdiv>\n          <div class=\"row\" style=\"margin-top:7px\"><span class=\"k\">Suppress<\u002Fspan><span class=\"chips\"><span class=\"chip\">Demo page visitors / converters<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"row\" style=\"margin-top:7px\"><span class=\"k\">Re-activate<\u002Fspan><span class=\"chips\"><span class=\"chip\">All Visits 180d<span class=\"sz\">81,047<\u002Fspan><\u002Fspan><span class=\"chip\">Web Visits 180d<span class=\"sz\">63,174<\u002Fspan><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"margin-top:10px\"><span class=\"k\">Ads<\u002Fspan><span class=\"chips\"><span class=\"chip\">Winning video (1F / 4E)<\u002Fspan><span class=\"chip\">1D Logo wall<\u002Fspan><span class=\"chip\">4B Auditor frame (Sunset Grown)<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"row\"><span class=\"k\">Lands on<\u002Fspan><span class=\"chips\"><span class=\"chip\">D4 McDonald's case<\u002Fspan><span class=\"chip\">D5 Sunset Grown<\u002Fspan><span class=\"chip\">Demo page<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div class=\"note\">Air-cover targets both the June 16 email launch and the webinar. Webinar registration counts as a BOFU conversion.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- OUTCOME terminator -->\n    <div class=\"node term white\" style=\"left:240px;top:1948px;width:620px;height:88px;background:var(--launch)\">\n      <div class=\"kicker\">OUTCOME<\u002Fdiv>\n      <div class=\"n-title\">BOFU - Demos &amp; Qualified Pipeline<\u002Fdiv>\n      <div class=\"n-meta\">The funnel converts the warm pool into demos, webinar registrations and pipeline - paid air-cover against the June 16 email launch and the webinar.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ============ DECISIONS NEEDED ============ -->\n  <div class=\"decisions\">\n    <div class=\"dh\">\n      <span class=\"bn\">Decisions needed before the June 3 launch<\u002Fspan>\n      <span class=\"tagn\">Confirm on the June 2 call<\u002Fspan>\n    <\u002Fdiv>\n    <ul>\n      <li><b>TOFU audience set.<\u002Fb> The creative draft proposes Set A = matched 20k list and Set B = 1-3% lookalike on closed-won F&amp;B; this chart uses HubSpot F&amp;B Prospects + Manufacturing (live today). Confirm which set goes live before June 3.<\u002Fli>\n      <li><b>LinkedIn Insight Tag.<\u002Fb> Confirm the tag is live and firing on every destination page (D1-D8) before June 3, so the retargeting pool can fill.<\u002Fli>\n      <li><b>Budget reallocation.<\u002Fb> Confirm capping Microsoft at $5K to free the $10K shift, plus the $10K incremental, into the $28K June LinkedIn envelope.<\u002Fli>\n      <li><b>Gated asset.<\u002Fb> Confirm Rocky's gated asset is ready so MOFU stands up about a week after launch.<\u002Fli>\n      <li><b>Day-14 read.<\u002Fb> Sign off on the 4-signal read criteria and the ~70/30 reallocation split at the Day 14 read.<\u002Fli>\n      <li><b>Webinar.<\u002Fb> Confirm registration page live date (~June 10) and URL, so it can run as a MOFU/BOFU destination.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <!-- ============ LEGEND / BRAND CARD ============ -->\n  <div class=\"legend\">\n    <div>\n      <div class=\"brand\">\n        <svg class=\"mark\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"5\" cy=\"6\" r=\"3\" fill=\"#16b3a4\"><\u002Fcircle><circle cx=\"5\" cy=\"18\" r=\"3\" fill=\"#3d8ad6\"><\u002Fcircle><circle cx=\"19\" cy=\"12\" r=\"3\" fill=\"#ef6a39\"><\u002Fcircle><path d=\"M7.5 7.3 16.5 11M7.5 16.7 16.5 13\" stroke=\"#aab4da\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg>\n        <div class=\"bn\">Reading the chart<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"leg-sub\">Shapes<\u002Fdiv>\n      <div class=\"swatches\">\n        <div class=\"sw\"><span class=\"shp pill\"><\u002Fspan><span class=\"lab\"><b>Terminator<\u002Fb> · start / end of the flow (pill)<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"shp rect\"><\u002Fspan><span class=\"lab\"><b>Process<\u002Fb> · funnel stage or ad set<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"shp dia2\"><\u002Fspan><span class=\"lab\"><b>Decision<\u002Fb> · branch gate (diamond)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"leg-sub\">Colors (stages)<\u002Fdiv>\n      <div class=\"swatches\">\n        <div class=\"sw\"><span class=\"dot\" style=\"background:var(--tofu)\"><\u002Fspan><span class=\"lab\"><b>TOFU<\u002Fb> · awareness &amp; engagement<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"dot\" style=\"background:var(--pool)\"><\u002Fspan><span class=\"lab\"><b>Engagement pool<\u002Fb> · retargeting segment<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"dot\" style=\"background:var(--mofu)\"><\u002Fspan><span class=\"lab\"><b>MOFU<\u002Fb> · gated content<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"dot\" style=\"background:var(--bofu)\"><\u002Fspan><span class=\"lab\"><b>BOFU<\u002Fb> · launch amplification<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"dot\" style=\"background:var(--launch)\"><\u002Fspan><span class=\"lab\"><b>Outcome<\u002Fb> · demos, webinar regs &amp; pipeline<\u002Fspan><\u002Fdiv>\n        <div class=\"sw\"><span class=\"dia\" style=\"background:var(--decision)\"><\u002Fspan><span class=\"lab\"><b>Decision gate<\u002Fb> · Day 14 read<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"leg-sub\">Decision exits<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px\">\n        <span class=\"yn\" style=\"font-size:11.5px\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\" fill=\"#fff\" stroke=\"var(--check)\" stroke-width=\"2.2\"><\u002Fcircle><path d=\"M8 12.3 L11 15.3 L16.5 9\" fill=\"none\" stroke=\"var(--check)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Winning hook · ~70% of next phase<\u002Fspan>\n        <span class=\"yn\" style=\"font-size:11.5px\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\" fill=\"#fff\" stroke=\"var(--x)\" stroke-width=\"2.2\"><\u002Fcircle><path d=\"M8.5 8.5 L15.5 15.5 M15.5 8.5 L8.5 15.5\" stroke=\"var(--x)\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>Hedge · ~30% held back<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"notes\">\n      <p><b>The budget envelope.<\u002Fb> The $28K June LinkedIn envelope = $8K LinkedIn base (May used $5,019) + $10K incremental from the call + $10K shifted from Microsoft. Split ~$13K TOFU / ~$6K MOFU / ~$9K BOFU.<\u002Fp>\n      <p><b>Creative codes (1A-4E).<\u002Fb> The named ad variants from the Food &amp; Beverage LinkedIn TOFU Creative v1 draft. Single image variants lead (the proven $32 CPA format); the named-peer treatments (1A, 1B) wait for legal; document ads (1E, 4D) carry the deeper content into MOFU; the winning hook's video (1F or 4E) unlocks after the Day 14 read. D1-D8 are the live destination pages in the same draft.<\u002Fp>\n      <p><b>The Microsoft shift.<\u002Fb> Microsoft ran $28,275 in May. Capping it at $5K frees ~$23K, of which $10K moves into this LinkedIn sprint now. The remaining ~$13K stays available to scale the winning hook after the Day 14 read.<\u002Fp>\n      <p><b>Sources.<\u002Fb> LinkedIn Ads account 507686629, live pull June 1, 2026. Microsoft Ads campaign report, May 1-31, 2026. Hooks, personas and destinations from the Food &amp; Beverage LinkedIn TOFU Creative v1 draft.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  function fit(){\n    var sheet=document.querySelector('.sheet');\n    var scaler=document.querySelector('.scaler');\n    var avail=document.documentElement.clientWidth-40;\n    var scale=Math.min(1, avail/1100);\n    sheet.style.transform='scale('+scale+')';\n    scaler.style.height=(sheet.offsetHeight*scale)+'px';\n  }\n  window.addEventListener('resize',fit);\n  window.addEventListener('load',fit);\n  fit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
